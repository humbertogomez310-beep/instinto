<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSTINTO</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

<h1>INSTINTO</h1>

<p id="intro">
Responde 7 preguntas rápido y descubre tu instinto dominante.
</p>

<button id="startBtn">COMENZAR</button>

<div id="game" class="hidden">

<h2 id="questionNumber"></h2>

<img id="questionImage" src="" />

<p id="questionText"></p>

<div id="answers"></div>

</div>

<div id="explodeScreen" class="hidden">

<p>Tu instinto está listo...</p>

<button id="explodeBtn">💥 EXPLOTAR</button>

</div>

<div id="resultScreen" class="hidden">

<h2>INSTINTO</h2>

<h1 id="instinctResult"></h1>

<p id="percentText"></p>

<div class="bar">
<div id="percentBar"></div>
</div>

<p>
Tu instinto puede cambiar.<br>
Intenta otra vez.
</p>

<div class="buttons">

<button onclick="restartGame()">Volver a jugar</button>

<button onclick="shareResult()">Compartir</button>

<button onclick="challengeFriend()">Desafiar a un amigo</button>

</div>

</div>

<footer>H.B.G.</footer>

</div>

<script src="script.js"></script>

</body>
</html>
