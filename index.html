<!DOCTYPE html>
<html lang="es">

<head>

</head>

<body>

<!-- PANTALLA INICIO -->

y descubre tu instinto dominante.
</p>

<div class="firma">H.B.G.</div>

</div>

<div id="opciones"></div>

</div>


<!-- PANTALLA RESULTADO -->

<div id="resultadoPantalla" class="pantalla oculto">

<h2 id="instintoFinal"></h2>

<p id="porcentaje"></p>

<div class="barra">

</div>

<button onclick="reiniciar()">Volver a jugar</button>
