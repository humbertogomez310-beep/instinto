<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>INSTINTO</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="inicio" class="pantalla">

<h1>🧠 INSTINTO</h1>

<p id="contador"></p>

<p>
¿Tus decisiones nacen de la lógica,
de la intuición o de la reacción?
</p>

<button onclick="iniciarJuego()">🚀 Jugar</button>

</div>


<div id="juego" class="pantalla oculto">

<div id="progreso"></div>

<h2 id="pregunta"></h2>

<p id="frase">Confía en tu primera reacción.</p>

<div id="respuestas"></div>

</div>


<div id="resultado" class="pantalla oculto">

<h2 id="tipoInstinto"></h2>

<p id="descripcion"></p>

<div id="barra">
<div id="porcentaje"></div>
</div>

<p id="textoPorcentaje"></p>

<p id="instintoExtra"></p>

<button onclick="compartir()">📤 Reta a tus amigos</button>

<button onclick="reiniciar()">🔁 Volver a jugar</button>

</div>

<script src="script.js"></script>

</body>
</html>
