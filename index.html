<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#140f2d" />
  <title>INSTINTO</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section id="start-screen" class="screen active card">
      <div class="badge">INSTINTO</div>
      <h1>¿Tu instinto decide por ti?</h1>
      <p>
        Responde 7 preguntas rápidas y descubre qué tipo de instinto domina tus decisiones.
      </p>
      <p class="small-note">Toma menos de 30 segundos.</p>
      <button id="start-btn" class="primary-btn">DESCUBRIR MI INSTINTO</button>
    </section>

    <section id="quiz-screen" class="screen card">
      <div class="top-row">
        <div class="question-counter" id="question-counter">Pregunta 1 de 7</div>
        <div class="progress-track" aria-hidden="true">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
      </div>

      <h2 id="question" class="question-title"></h2>
      <div id="answers" class="answers"></div>
    </section>

    <section id="loading-screen" class="screen card">
      <div class="badge">ANALIZANDO</div>
      <h2>Analizando tu instinto...</h2>
      <div class="loader"></div>
      <p class="small-note">Esto tarda solo un instante.</p>
    </section>

    <section id="result-screen" class="screen card">
      <div class="badge">TU RESULTADO</div>
      <h2 id="result-title" class="result-title"></h2>
      <p id="result-description" class="result-description"></p>

      <div class="result-box">
        <p id="result-stats" class="result-stats"></p>
      </div>

      <div class="buttons">
        <button id="share-btn" class="primary-btn">COMPARTIR EN WHATSAPP</button>
        <button id="challenge-btn" class="secondary-btn">RETAR A UN AMIGO</button>
        <button id="copy-btn" class="secondary-btn">COPIAR ENLACE</button>
        <button id="retry-btn" class="ghost-btn">INTENTAR OTRA VEZ</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
