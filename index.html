<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>INSTINTO 🧠</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="top">
  <button id="soundToggle" class="icon">🔊</button>
  <h1>🧠 INSTINTO</h1>
</header>

<main>
  <!-- INICIO -->
  <section id="inicio" class="pantalla">
    <p id="contador" class="muted">👥 Cargando...</p>
    <p class="lead">Responde 7 preguntas rápidas y descubre tu instinto dominante.</p>
    <p id="reto" class="muted small"></p>
    <div class="controls">
      <button id="startBtn" class="primary">🚀 Jugar</button>
    </div>
  </section>

  <!-- JUEGO -->
  <section id="juego" class="pantalla oculto">
    <div class="top-row">
      <div id="progreso" class="muted">Pregunta 1 de 7</div>
      <div id="progressBarWrap"><div id="progressBar"></div></div>
    </div>

    <div id="questionCard" class="card fade">
      <h2 id="pregunta" class="pregunta">Pregunta</h2>
      <p id="frase" class="frase muted">Frase motivadora</p>

      <div id="respuestas" class="opciones"></div>
    </div>
  </section>

  <!-- RESULTADO -->
  <section id="resultado" class="pantalla oculto">
    <div id="resultCard" class="card">
      <h2 id="tipoInstinto">Resultado</h2>
      <p id="descripcion" class="muted"></p>
      <p id="instintoExtra" class="muted small"></p>

      <div id="barra">
        <div id="porcentaje"></div>
      </div>
      <p id="textoPorcentaje" class="muted"></p>

      <h3>📊 Ranking (simulado)</h3>
      <div id="ranking" class="muted small"></div>

      <div class="result-actions">
        <button id="shareBtn" class="secondary">📤 Compartir</button>
        <button id="challengeBtn" class="secondary">🔥 Desafiar a un amigo</button>
        <button id="restartBtn" class="primary">🔁 Volver a jugar</button>
      </div>
    </div>
  </section>
</main>

<footer class="footer muted small">H.B.G. — INSTINTO</footer>

<script src="script.js"></script>
</body>
</html>
