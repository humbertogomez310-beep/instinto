<!DOCTYPE html>
<html lang="es">

<head>

</head>

<body>

<div id="inicio" class="pantalla">

<p id="reto"></p>

<button onclick="iniciarJuego()">🚀 Jugar</button>

</div>


<div id="juego" class="pantalla oculto">

<h3 id="progreso"></h3>

<h2 id="pregunta"></h2>

<p id="frase"></p>

<div id="respuestas"></div>

</div>


<div id="resultado" class="pantalla oculto">

<h2 id="tipoInstinto"></h2>

<p id="descripcion"></p>

<div id="barra">
<div id="porcentaje"></div>
</div>

<p id="textoPorcentaje"></p>

<h3>📊 Ranking de instintos</h3>

<div id="ranking"></div>

<button onclick="compartir()">📤 Compartir resultado</button>

<button onclick="desafio()">🔥 Desafiar a un amigo</button>

</div>


<script src="script.js"></script>
