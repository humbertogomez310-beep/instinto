  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>INSTINTO</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <button id="soundBtn" class="icon-btn">🔊 Sonido</button>
      <h1>INSTINTO 🧠</h1>
    </header>

    <main>
      <section id="startScreen">
        <p class="lead">Responde rápido. Tu primera reacción revela tu instinto.</p>
        <button id="startBtn" class="primary">Jugar</button>
        <p class="firma">H.B.G.</p>
      </section>

      <section id="game" class="hidden">
        <div id="topRow">
          <div id="contador" class="contador">Pregunta 1 de 7</div>
        </div>

        <div class="progress">
          <div id="progresoBar" class="progresoBar"></div>
        </div>

        <h2 id="pregunta" class="pregunta"></h2>
        <p id="frase" class="frase"></p>

        <div id="opciones" class="opciones"></div>
      </section>

      <section id="result" class="hidden">
        <h2 id="instinto" class="instinto"></h2>
        <p id="porcentaje" class="porcentaje"></p>

        <div class="barra">
          <div id="relleno" class="relleno" style="width:0%"></div>
        </div>

        <p id="descripcion" class="descripcion"></p>

        <div class="actions">
          <button id="shareBtn" class="secondary">Compartir</button>
          <button id="restartBtn" class="primary">Volver a jugar</button>
        </div>

        <p class="firma">H.B.G.</p>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
